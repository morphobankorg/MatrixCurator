[project]
name = "matrixcurator"
version = "2025.7.4"
authors = [
    { name = "Shreya Jariwala", email = "sjariwala@morphobank.org" },
]
requires-python = ">=3.11,<3.14"
dependencies = [
    "PyMuPDF",
    "pymupdf4llm",
    "google-cloud-vision",
    "google-cloud-aiplatform",
    "PyPDF2",
    "python-docx",
    "llama-index-core",
    "llama-parse",
    "llama-index-readers-file",
    "pydantic-settings>=2.10.1",
    "langgraph>=1.2.4",
    "pydantic>=2.13.4",
    "litellm>=1.87.0",
    "structlog>=25.5.0",
    "lume @ git+https://github.com/morphobankorg/lume-python.git",
    "docling",
    "dspy",
    "openinference-instrumentation-dspy",
    "mcp>=1.2.0",
    "sqlite-vec",
]

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "mkinit>=1.2.0",
]